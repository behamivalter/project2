<!DOCTYPE html>
<html>
<head>

<style>
*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

    margin:0;
    background:#fafafa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    width:350px;
    text-align:center;

    width:40px;
    height:40px;
    margin:auto;
    border-radius:50%;

    color:#d48b39;
    font-size:22px;
    display:flex;
    align-items:center;
    justify-content:center;

    margin-top:20px;
    font-size:26px;
    color:#222;
}
.subtitle{
    color:#888;
    margin-top:10px;
}
.circle{
    position:relative;
    width:120px;
    height:120px;
    margin:35px auto;
}
svg{
    transform:rotate(-90deg);
}
circle{
    fill:none;
    stroke-width:5;
}
.bg{
    stroke:#e8e8e8;
}
.progress{
    stroke:#d48b39;
    stroke-linecap:round;
    stroke-dasharray:314;
    stroke-dashoffset:0;
    transition:1s linear;
}
.number{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    font-size:42px;
    color:#222;
    font-weight:bold;
}
.bar{
    width:180px;
    height:5px;
    background:#ececec;
    margin:auto;
    border-radius:30px;
    overflow:hidden;
}
.bar-fill{
    width:0%;
    height:100%;
    background:#d48b39;
    transition:1s;
}
.status{
    margin-top:12px;
    color:#b97724;
    font-size:14px;
}
button{
    display:none;
    margin-top:25px;
    border:none;
    background:#f59e0b;
    color:white;
    padding:13px 35px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    opacity:.9;
}
button:disabled{
    opacity:0.5;
    cursor:not-allowed;
}
.footer{
    margin-top:40px;
    color:#aaa;
    font-size:12px;
}
</style>

</head>

        <div class="bar-fill" id="bar"></div>
